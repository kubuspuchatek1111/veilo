<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veilo - Secure Messaging</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <div id="nickname-screen">
    <h2>Veilo Chat</h2>
    <input type="text" id="nickname-input" placeholder="Twój nick..." maxlength="20" />
    <input type="password" id="secret-key" placeholder="Hasło pokoju (Klucz E2EE)..." />
    <button onclick="enterChat()">Wchodzę</button>
  </div>

  <div id="chat-screen" style="display: none;">
    <div id="sidebar">
        <h3>Aktywni</h3>
        <ul id="user-list"></ul>
    </div>
    <div id="chat-main">
        <div class="header">Veilo E2EE <span id="room-info"></span></div>
        <ul id="messages"></ul>
        <div id="typing-indicator"></div>
        <form id="message-form">
            <input type="text" id="message-input" placeholder="Napisz bezpieczną wiadomość..." />
            <button type="submit">Wyślij</button>
        </form>
    </div>
  </div>

  <script>
    const socket = io();
    let currentNickname = "";
    let roomPassword = "";
    const roomID = "global_room"; // Możesz to zmienić na dynamiczne

    function enterChat() {
        currentNickname = document.getElementById('nickname-input').value;
        roomPassword = document.getElementById('secret-key').value;

        if(!currentNickname || !roomPassword) return alert("Podaj nick i hasło!");

        document.getElementById('nickname-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';

        socket.emit('join', { nickname: currentNickname, room: roomID });
    }

    // Wysyłanie wiadomości (Szyfrowanie)
    document.getElementById('message-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('message-input');
        if(!input.value) return;

        // E2EE: Szyfrujemy treść kluczem pokoju przed wysłaniem
        const encrypted = CryptoJS.AES.encrypt(input.value, roomPassword).toString();

        socket.emit('chat message', {
            room: roomID,
            nickname: currentNickname,
            text: encrypted
        });
        input.value = '';
    };

    // Odbieranie wiadomości (Deszyfrowanie)
    socket.on('chat message', (msg) => {
        const li = document.createElement('li');
        try {
            // Próba odszyfrowania
            const bytes = CryptoJS.AES.decrypt(msg.text, roomPassword);
            const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
            
            li.textContent = `${msg.nickname}: ${decryptedText || "[Błąd deszyfrowania - zły klucz]"}`;
        } catch(e) {
            li.textContent = `${msg.nickname}: [Wiadomość zaszyfrowana]`;
        }
        document.getElementById('messages').appendChild(li);
    });

    socket.on('user list', (list) => {
        const ul = document.getElementById('user-list');
        ul.innerHTML = list.map(u => `<li>${u}</li>`).join('');
    });
  </script>
</body>
</html>
