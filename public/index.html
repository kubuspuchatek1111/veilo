<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veilo Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ekran logowania -->
    <div id="nickname-screen">
        <img src="logo.png" alt="Veilo Logo" style="width: 80px; height: 80px;">
        <h2>Witaj w Veilo Chat</h2>
        <p>Podaj swój nick i dołącz do pokoju:</p>
        
        <input type="text" id="nickname-input" placeholder="Twój nick..." maxlength="20">
        <input type="text" id="room-input" placeholder="Nazwa pokoju (hash)" maxlength="50">
        <input type="password" id="secret-key" placeholder="Sekretne hasło (opcjonalne)">
        
        <button id="join-btn">Dołącz do pokoju</button>
        <p><a href="generator.html" target="_blank">Generator pokojów</a></p>
    </div>

    <!-- Ekran czatu -->
    <div id="chat-screen" style="display: none;">
        <!-- Sidebar -->
        <div id="sidebar">
            <h3>Użytkownicy</h3>
            <ul id="user-list"></ul>
            <button id="notify-btn">Powiadomienia</button>
            <a href="#" class="settings-nav-btn" id="settings-btn">Ustawienia</a>
        </div>

        <!-- Główna część czatu -->
        <div id="chat-main">
            <!-- Header z kopiowaniem pokoju (bez "secure") -->
            <div class="header">
                <div id="room-info">
                    <div id="room-name">Pokój: <span id="current-room">-</span></div>
                </div>
                <!-- PRZYCISK KOPIUJ ZAMIAST "secure" -->
                <button id="copy-room-btn" title="Skopiuj pełny hash pokoju" disabled>
                    📋 Kopiuj hash
                </button>
            </div>

            <!-- Wskaźnik pisania -->
            <div id="typing-indicator"></div>

            <!-- Wiadomości -->
            <ul id="messages"></ul>

            <!-- Formularz wiadomości -->
            <form id="message-form">
                <input id="message-input" placeholder="Wpisz wiadomość..." autocomplete="off">
                <button type="submit">Wyślij</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        class VeiloChat {
            constructor() {
                this.socket = io();
                this.currentRoom = '';
                this.nickname = '';
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadTheme();
            }

            bindEvents() {
                document.getElementById('join-btn').onclick = () => this.joinRoom();
                document.getElementById('nickname-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.joinRoom();
                });

                // Kopiowanie pokoju
                document.getElementById('copy-room-btn').onclick = () => this.copyRoomHash();

                // Formularz wiadomości
                document.getElementById('message-form').onsubmit = (e) => {
                    e.preventDefault();
                    this.sendMessage();
                };

                // Socket events
                this.socket.on('user list', (users) => this.updateUserList(users));
                this.socket.on('user joined', (nick) => this.addSystemMessage(`${nick} dołączył`));
                this.socket.on('user left', (nick) => this.addSystemMessage(`${nick} opuścił pokój`));
                this.socket.on('chat message', (msg) => this.addChatMessage(msg));

                // Auto-focus
                document.getElementById('nickname-input').focus();
            }

            joinRoom() {
                this.nickname = document.getElementById('nickname-input').value.trim() || 'Gość';
                this.currentRoom = document.getElementById('room-input').value.trim() || 'default';
                
                if (!this.currentRoom) {
                    alert('Podaj nazwę pokoju!');
                    return;
                }

                // Zapisz w URL
                const url = new URL(window.location);
                url.searchParams.set('room', this.currentRoom);
                window.history.replaceState({}, '', url);

                // Dołącz
                this.socket.emit('join', { nickname: this.nickname, room: this.currentRoom });
                
                // Pokaż czat
                document.getElementById('nickname-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('current-room').textContent = this.currentRoom;
                document.getElementById('copy-room-btn').disabled = false;
            }

            copyRoomHash() {
                const btn = document.getElementById('copy-room-btn');
                navigator.clipboard.writeText(this.currentRoom).then(() => {
                    const originalText = btn.textContent;
                    btn.textContent = '✓ Skopiowano!';
                    btn.style.background = 'var(--msg-self-bg)';
                    btn.disabled = true;
                    
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.style.background = '';
                        btn.disabled = false;
                    }, 2000);
                }).catch(() => {
                    alert('Hash skopiowany: ' + this.currentRoom);
                });
            }

            sendMessage() {
                const input = document.getElementById('message-input');
                const message = input.value.trim();
                if (message) {
                    this.socket.emit('chat message', {
                        nickname: this.nickname,
                        message,
                        room: this.currentRoom
                    });
                    input.value = '';
                }
            }

            updateUserList(users) {
                const ul = document.getElementById('user-list');
                ul.innerHTML = users.map(user => `<li>${user}</li>`).join('');
            }

            addChatMessage(msg) {
                const li = document.createElement('li');
                li.className = msg.nickname === this.nickname ? 'self' : '';
                li.innerHTML = `<strong>${msg.nickname}:</strong> ${msg.message}`;
                document.getElementById('messages').appendChild(li);
                li.scrollIntoView({ behavior: 'smooth' });
            }

            addSystemMessage(text) {
                const li = document.createElement('li');
                li.className = 'system';
                li.textContent = text;
                document.getElementById('messages').appendChild(li);
                li.scrollIntoView({ behavior: 'smooth' });
            }

            setTheme(theme) {
                document.body.className = theme + '-theme';
                localStorage.setItem('veilo-theme', theme);
            }

            loadTheme() {
                const saved = localStorage.getItem('veilo-theme') || 'dark';
                this.setTheme(saved);
            }
        }

        new VeiloChat();
    </script>
</body>
</html>
