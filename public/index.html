<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veilo Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Ekran logowania -->
    <div id="nickname-screen">
        <img src="logo.png" alt="Veilo Logo">
        <h2>Witaj w Veilo Chat</h2>
        <p>Podaj dane do pokoju:</p>
        
        <input type="text" id="nickname-input" placeholder="Twój nick..." maxlength="20">
        <input type="text" id="room-password" placeholder="Hasło pokoju">
        
        <button id="join-btn">
            <span>Dołącz do pokoju</span>
            <div class="btn-shine"></div>
        </button>
        
        <div class="generator-section">
            <a href="generator.html" target="_blank" class="generator-btn">
                <span class="btn-icon">✨</span>
                <span class="btn-text">Stwórz nowy pokój</span>
                <span class="btn-arrow">→</span>
            </a>
        </div>
        
        <small id="room-hash-display" style="display: none;"></small>
    </div>

    <!-- Ekran czatu -->
    <div id="chat-screen" style="display: none;">
        <!-- Sidebar -->
        <div id="sidebar">
            <h3>Użytkownicy</h3>
            <ul id="user-list"></ul>
        </div>

        <!-- Główna część czatu -->
        <div id="chat-main">
            <!-- Header -->
            <div class="header">
                <div id="room-name">
                    Pokój: <span id="current-room">-</span>
                </div>
                <button id="copy-room-btn" title="Skopiuj pełny hash pokoju" disabled>
                    📋 Kopiuj hash
                </button>
            </div>

            <!-- Wiadomości -->
            <ul id="messages"></ul>

            <!-- Formularz -->
            <form id="message-form">
                <input id="message-input" placeholder="Wpisz wiadomość..." autocomplete="off">
                <button type="submit">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                    </svg>
                    Wyślij
                </button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        class VeiloChat {
            constructor() {
                this.socket = io();
                this.currentRoom = '';
                this.nickname = '';
                this.roomPassword = '';
                this.init();
            }

            init() {
                this.bindEvents();
            }

            bindEvents() {
                document.getElementById('join-btn').onclick = () => this.joinRoom();
                document.getElementById('room-password').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.joinRoom();
                });
                document.getElementById('nickname-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.joinRoom();
                });

                document.getElementById('copy-room-btn').onclick = () => this.copyRoomHash();
                document.getElementById('message-form').onsubmit = (e) => {
                    e.preventDefault();
                    this.sendMessage();
                };

                this.socket.on('user list', (users) => this.updateUserList(users));
                this.socket.on('user joined', (nick) => this.addSystemMessage(`${nick} dołączył`));
                this.socket.on('user left', (nick) => this.addSystemMessage(`${nick} opuścił pokój`));
                this.socket.on('chat message', (msg) => this.addChatMessage(msg));
                this.socket.on('error', (msg) => this.showError(msg));
            }

            generateRoomHash(password) {
                const salt = "veilo-salt-2026";
                let hash = 0;
                const str = salt + password.toLowerCase().trim();
                
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                
                return Math.abs(hash).toString(36).substring(0, 8).toUpperCase();
            }

            joinRoom() {
                this.nickname = document.getElementById('nickname-input').value.trim() || 'Gość';
                this.roomPassword = document.getElementById('room-password').value.trim();
                
                if (!this.roomPassword) {
                    this.shakeInput('room-password');
                    return;
                }

                this.currentRoom = this.generateRoomHash(this.roomPassword);
                
                const hashDisplay = document.getElementById('room-hash-display');
                hashDisplay.textContent = `Hash pokoju: ${this.currentRoom}`;
                hashDisplay.style.display = 'block';

                const url = new URL(window.location);
                url.searchParams.set('room', this.currentRoom);
                window.history.replaceState({}, '', url);

                this.socket.emit('join', { 
                    nickname: this.nickname, 
                    room: this.currentRoom,
                    password: this.roomPassword 
                });
                
                setTimeout(() => {
                    document.getElementById('nickname-screen').style.display = 'none';
                    document.getElementById('chat-screen').style.display = 'flex';
                    document.getElementById('current-room').textContent = this.currentRoom;
                    document.getElementById('copy-room-btn').disabled = false;
                }, 500);
            }

            copyRoomHash() {
                const btn = document.getElementById('copy-room-btn');
                const fullUrl = `${window.location.origin}/?room=${this.currentRoom}`;
                
                navigator.clipboard.writeText(fullUrl).then(() => {
                    btn.innerHTML = '✓ Skopiowano!';
                    btn.classList.add('copied');
                    btn.disabled = true;
                    
                    setTimeout(() => {
                        btn.innerHTML = '📋 Kopiuj hash';
                        btn.classList.remove('copied');
                        btn.disabled = false;
                    }, 2000);
                }).catch(() => {
                    alert('Pełny link: ' + fullUrl);
                });
            }

            sendMessage() {
                const input = document.getElementById('message-input');
                const message = input.value.trim();
                if (message) {
                    this.socket.emit('chat message', {
                        nickname: this.nickname,
                        message,
                        room: this.currentRoom,
                        password: this.roomPassword
                    });
                    input.value = '';
                }
            }

            updateUserList(users) {
                const ul = document.getElementById('user-list');
                ul.innerHTML = users.map(user => `<li>${user}</li>`).join('');
            }

            addChatMessage(msg) {
                const li = document.createElement('li');
                li.className = msg.nickname === this.nickname ? 'self' : '';
                li.innerHTML = `
                    <strong>${msg.nickname}</strong>
                    <span>${msg.message}</span>
                    <div class="message-time">${new Date(msg.timestamp || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                `;
                document.getElementById('messages').appendChild(li);
                li.scrollIntoView({ behavior: 'smooth' });
            }

            addSystemMessage(text) {
                const li = document.createElement('li');
                li.className = 'system';
                li.textContent = text;
                document.getElementById('messages').appendChild(li);
                li.scrollIntoView({ behavior: 'smooth' });
            }

            showError(msg) {
                this.addSystemMessage(`❌ ${msg}`);
            }

            shakeInput(id) {
                const input = document.getElementById(id);
                input.style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => {
                    input.style.animation = '';
                }, 500);
            }
        }

        new VeiloChat();
    </script>
</body>
</html>
