<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veilo Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ekran logowania -->
    <div id="nickname-screen">
        <img src="logo.png" alt="Veilo Logo" style="width: 80px; height: 80px;">
        <h2>Witaj w Veilo Chat</h2>
        <p>Podaj swój nick i dołącz do pokoju:</p>
        
        <input type="text" id="nickname-input" placeholder="Twój nick..." maxlength="20">
        <input type="text" id="room-input" placeholder="Nazwa pokoju (hash)" maxlength="50">
        <input type="password" id="secret-key" placeholder="Sekretne hasło (opcjonalne)">
        
        <button id="join-btn">Dołącz do pokoju</button>
        <p><a href="generator.html" target="_blank">Generator pokojów</a></p>
    </div>

    <!-- Ekran czatu -->
    <div id="chat-screen" style="display: none;">
        <!-- Sidebar -->
        <div id="sidebar">
            <h3>Użytkownicy</h3>
            <ul id="user-list"></ul>
            <button id="notify-btn">Powiadomienia</button>
            <a href="#" class="settings-nav-btn" id="settings-btn">Ustawienia</a>
        </div>

        <!-- Główna część czatu -->
        <div id="chat-main">
            <!-- Header z kopiowaniem pokoju -->
            <div class="header">
                <div id="room-info">
                    <div id="room-name">Pokój: <span id="current-room">-</span></div>
                </div>
                <button id="copy-room-btn" title="Skopiuj pełny hash pokoju" disabled>
                    📋 Kopiuj
                </button>
            </div>

            <!-- Wskaźnik pisania -->
            <div id="typing-indicator"></div>

            <!-- Wiadomości -->
            <ul id="messages"></ul>

            <!-- Formularz wiadomości -->
            <form id="message-form">
                <input id="message-input" placeholder="Wpisz wiadomość..." autocomplete="off">
                <button type="submit">Wyślij</button>
            </form>
        </div>
    </div>

    <!-- Ekran ustawień -->
    <div id="settings-screen" style="display: none;">
        <div id="settings-main">
            <div class="settings-group">
                <h4>Motyw</h4>
                <div class="theme-options">
                    <button class="theme-btn active" data-theme="dark">Ciemny</button>
                    <button class="theme-btn" data-theme="light">Jasny</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        class VeiloChat {
            constructor() {
                this.socket = io();
                this.currentRoom = '';
                this.nickname = '';
                this.isTyping = false;
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadTheme();
            }

            bindEvents() {
                // Ekran logowania
                document.getElementById('join-btn').onclick = () => this.joinRoom();
                document.getElementById('nickname-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.joinRoom();
                });

                // Kopiowanie pokoju
                document.getElementById('copy-room-btn').onclick = () => this.copyRoomHash();

                // Formularz wiadomości
                document.getElementById('message-form').onsubmit = (e) => {
                    e.preventDefault();
                    this.sendMessage();
                };

                // Pisanie
                const messageInput = document.getElementById('message-input');
                messageInput.oninput = () => this.handleTyping();

                // Socket events
                this.socket.on('user list', (users) => this.updateUserList(users));
                this.socket.on('user joined', (nick) => this.addSystemMessage(`${nick} dołączył`));
                this.socket.on('user left', (nick) => this.addSystemMessage(`${nick} opuścił pokój`));
                this.socket.on('chat message', (msg) => this.addChatMessage(msg));

                // Ustawienia
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.onclick = () => this.setTheme(btn.dataset.theme);
                });
            }

            async joinRoom() {
                this.nickname = document.getElementById('nickname-input').value.trim() || 'Gość';
                this.currentRoom = document.getElementById('room-input').value.trim() || 'default';
                
                if (!this.currentRoom) {
                    alert('Podaj nazwę pokoju!');
                    return;
                }

                // Zapisz w URL dla łatwego udostępniania
                const url = new URL(window.location);
                url.searchParams.set('room', this.currentRoom);
                window.history.replaceState({}, '', url);

                // Dołącz do pokoju
                this.socket.emit('join', { nickname: this.nickname, room: this.currentRoom });
                
                // Pokaż ekran czatu
                document.getElementById('nickname-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('current-room').textContent = this.currentRoom;
                document.getElementById('copy-room-btn').disabled = false;
            }

            async copyRoomHash() {
                const btn = document.getElementById('copy-room-btn');
                try {
                    await navigator.clipboard.writeText(this.currentRoom);
                    this.showCopyFeedback(btn);
                } catch {
                    const textarea = document.createElement('textarea');
                    textarea.value = this.currentRoom;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    this.showCopyFeedback(btn);
                }
            }

            showCopyFeedback(btn) {
                const originalText = btn.textContent;
                btn.textContent = '✓ Skopiowano!';
                btn.classList.add('copied');
                btn.disabled = true;
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                    btn.disabled = false;
                }, 2000);
            }

            sendMessage() {
                const input = document.getElementById('message-input');
                const message = input.value.trim();
                if (message) {
                    this.socket.emit('chat message', {
                        nickname: this.nickname,
                        message: message,
                        room: this.currentRoom
                    });
                    input.value = '';
                }
            }

            handleTyping() {
                if (!this.isTyping) {
                    this.isTyping = true;
                    this.socket.emit('typing', { room: this.currentRoom, nickname: this.nickname });
                }
                clearTimeout(this.typingTimeout);
                this.typingTimeout = setTimeout(() => {
                    this.isTyping = false;
                    this.socket.emit('stop typing', { room: this.currentRoom });
                }, 1000);
            }

            updateUserList(users) {
                const ul = document.getElementById('user-list');
                ul.innerHTML = users.map(user => `<li>${user}</li>`).join('');
            }

            addChatMessage(msg) {
                const li = document.createElement('li');
                li.className = msg.nickname === this.nickname ? 'self' : '';
                
                // Wzmianki @nick
                const highlighted = this.highlightMentions(msg.message);
                
                li.innerHTML = `
                    <strong>${msg.nickname}:</strong>
                    <span>${highlighted}</span>
                `;
                document.getElementById('messages').appendChild(li);
                li.scrollIntoView();
            }

            addSystemMessage(text) {
                const li = document.createElement('li');
                li.className = 'system';
                li.textContent = text;
                document.getElementById('messages').appendChild(li);
                li.scrollIntoView();
            }

            highlightMentions(text) {
                return text.replace(/@(\w+)/g, '<span class="mention">@$1</span>');
            }

            setTheme(theme) {
                document.body.className = theme + '-theme';
                localStorage.setItem('veilo-theme', theme);
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
            }

            loadTheme() {
                const saved = localStorage.getItem('veilo-theme') || 'dark';
                this.setTheme(saved);
            }
        }

        // Start aplikacji
        new VeiloChat();

        // Auto-join z URL
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room');
            if (room) {
                document.getElementById('room-input').value = room;
                document.getElementById('nickname-input').focus();
            }
        });
    </script>
</body>
</html>
