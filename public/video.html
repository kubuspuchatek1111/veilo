<!DOCTYPE html>
<html>
<head>
    <title>Veilo Video</title>
    <style>
        body { margin: 0; background: #000; font-family: Arial; color: white; }
        .videos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 90vh; padding: 10px; }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
                   background: rgba(0,0,0,0.8); padding: 20px; border-radius: 30px; display: flex; gap: 15px; }
        button { padding: 15px 25px; border: none; border-radius: 25px; color: white; 
                background: #10b981; cursor: pointer; font-size: 16px; }
        button.active { background: #ef4444; }
    </style>
</head>
<body>
    <div class="videos">
        <video id="localVideo" autoplay muted></video>
        <video id="remoteVideo" autoplay></video>
    </div>
    <div class="controls">
        <button id="toggleVideo" class="active">📹 Video</button>
        <button id="toggleAudio" class="active">🔊 Audio</button>
        <button id="endCall">❌ Zakończ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream, pc;
        let room = new URLSearchParams(window.location.search).get('room') || 'test';

        // Inicjalizacja
        navigator.mediaDevices.getUserMedia({video: true, audio: true})
            .then(stream => {
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                socket.emit('join', {nickname: 'VideoUser', room, password: 'video'});
                createPeerConnection();
            });

        function createPeerConnection() {
            pc = new RTCPeerConnection({
                iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
            });

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            
            pc.ontrack = e => {
                document.getElementById('remoteVideo').srcObject = e.streams[0];
            };

            pc.onicecandidate = e => {
                if (e.candidate) {
                    socket.emit('webrtc-ice-candidate', {
                        target: 'all',
                        candidate: e.candidate
                    });
                }
            };
        }

        // Controls
        document.getElementById('toggleVideo').onclick = () => {
            const videoTrack = localStream.getVideoTracks()[0];
            videoTrack.enabled = !videoTrack.enabled;
            this.classList.toggle('active');
        };

        document.getElementById('toggleAudio').onclick = () => {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            this.classList.toggle('active');
        };
    </script>
</body>
</html>
